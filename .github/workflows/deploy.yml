name: Build & Deploy to Cloudflare Pages

# Runs the full quality-gate suite, then deploys the static + Functions bundle
# to Cloudflare Pages. Production deploys happen on push to main; PRs get
# preview deploys against the same Pages project so chairs/reviewers can see
# the rendered output before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests (164/164 baseline + Phase 5 additions)
        run: npm test

      - name: Lint dean-facing strings against the §17 glossary
        run: npm run lint:glossary

      - name: Validate panel anchor invariants
        run: node scripts/validate-panel-anchors.mjs

      - name: Build Pages output
        run: npm run build:pages

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-pages --project-name=csu-deans-ep-tool --branch=${{ github.head_ref || github.ref_name }}

      - name: Skip-deploy notice (no Cloudflare secrets configured)
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "::notice::CLOUDFLARE_API_TOKEN secret not set; skipping deploy. Set CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID in repo Secrets to enable Pages deploys."
